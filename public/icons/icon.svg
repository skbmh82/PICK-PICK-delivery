<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 배경 -->
  <rect width="512" height="512" rx="120" fill="#6B21A8"/>
  <!-- 그라데이션 오버레이 -->
  <defs>
    <radialGradient id="grad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4C1D95" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="120" fill="url(#grad)"/>
  <!-- PICK 텍스트 -->
  <text x="256" y="220" font-family="Arial Black, sans-serif" font-size="120" font-weight="900"
    fill="#FCD34D" text-anchor="middle" letter-spacing="-2">PICK</text>
  <!-- 픽픽 텍스트 -->
  <text x="256" y="330" font-family="Arial Black, sans-serif" font-size="80" font-weight="900"
    fill="white" text-anchor="middle" opacity="0.9">PICK</text>
  <!-- 별 장식 -->
  <circle cx="100" cy="380" r="18" fill="#FCD34D" opacity="0.7"/>
  <circle cx="412" cy="150" r="12" fill="#FCD34D" opacity="0.5"/>
  <circle cx="380" cy="400" r="8" fill="white" opacity="0.4"/>
  <circle cx="130" cy="140" r="10" fill="white" opacity="0.3"/>
</svg>
